<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Flight Simulator Demo</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="hud">
    <div>Speed: <span id="speedValue">0</span> kt</div>
    <div>Altitude: <span id="altValue">0</span> ft</div>
    <div>Pitch: <span id="pitchValue">0</span>&deg;</div>
    <div>Roll: <span id="rollValue">0</span>&deg;</div>
    <div>Throttle: <span id="throttleValue">0</span>%</div>
  </div>
  <canvas id="simCanvas"></canvas>
  <script src="script.js"></script>
</body>
</html>
