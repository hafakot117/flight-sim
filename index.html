<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flight Simulator Demo</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, sans-serif;
}
body {
  background: radial-gradient(circle at top, #1a2a6c 0%, #000 60%, #020b1b 100%);
  overflow: hidden;
  color: #e0f0ff;
}
#simCanvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.45);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.4;
  backdrop-filter: blur(6px);
  z-index: 10;
}
#hud div {
  display: flex;
  gap: 6px;
}
  </style>
</head>
<body>
  <div id="hud">
    <div>Speed: <span id="speedValue">0</span> kt</div>
    <div>Altitude: <span id="altValue">0</span> ft</div>
    <div>Pitch: <span id="pitchValue">0</span>&deg;</div>
    <div>Roll: <span id="rollValue">0</span>&deg;</div>
    <div>Throttle: <span id="throttleValue">0</span>%</div>
  </div>
  <canvas id="simCanvas"></canvas>
  <script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const speedEl = document.getElementById('speedValue');
const altEl = document.getElementById('altValue');
const pitchEl = document.getElementById('pitchValue');
const rollEl = document.getElementById('rollValue');
const throttleEl = document.getElementById('throttleValue');

const plane = {x:0, y:50, z:0, pitch:0, roll:0, yaw:0, speed:0, throttle:0, onGround:true};
const physics = {maxThrottle:100, minThrottle:0, throttleStep:35, maxSpeed:140, accelPerThrottle:1.1, drag:0.025, gravity:9.81, liftFactor:0.15, stallSpeed:38, runwayFriction:0.35};
const keys = {ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, KeyW:false, KeyS:false, KeyA:false, KeyD:false, ShiftLeft:false};

window.addEventListener('keydown', (e) => {if(keys.hasOwnProperty(e.code)) {keys[e.code]=true; e.preventDefault();}});
window.addEventListener('keyup', (e) => {if(keys.hasOwnProperty(e.code)) {keys[e.code]=false; e.preventDefault();}});

function degToRad(d) {return d*Math.PI/180;}

let lastTime = performance.now();

function update(dt) {
  if(keys.KeyW) plane.throttle += physics.throttleStep*dt;
  if(keys.KeyS) plane.throttle -= physics.throttleStep*dt;
  plane.throttle = Math.max(physics.minThrottle, Math.min(physics.maxThrottle, plane.throttle));
  if(keys.ShiftLeft) plane.throttle *= 0.97;
  
  const pitchRate = 35;
  const rollRate = 55;
  if(keys.ArrowUp || (keys.KeyW && !plane.onGround)) plane.pitch += pitchRate*dt;
  if(keys.ArrowDown || (keys.KeyS && !plane.onGround)) plane.pitch -= pitchRate*dt;
  if(keys.ArrowLeft || keys.KeyA) plane.roll -= rollRate*dt;
  if(keys.ArrowRight || keys.KeyD) plane.roll += rollRate*dt;
  plane.pitch = Math.max(-30, Math.min(30, plane.pitch));
  plane.roll = Math.max(-65, Math.min(65, plane.roll));
  plane.yaw += plane.roll*dt*0.35;
  
  const throttleRatio = plane.throttle/physics.maxThrottle;
  const targetAccel = throttleRatio*physics.accelPerThrottle*physics.maxSpeed;
  let accel = targetAccel - physics.drag*plane.speed;
  if(plane.onGround) accel -= physics.runwayFriction*Math.sign(plane.speed);
  plane.speed += accel*dt;
  if(Math.abs(plane.speed) < 0.1) plane.speed = 0;
  plane.speed = Math.max(0, Math.min(physics.maxSpeed, plane.speed));
  
  const speedForLift = Math.max(0, plane.speed - physics.stallSpeed);
  const lift = speedForLift*physics.liftFactor*Math.sin(degToRad(plane.pitch));
  let verticalVel = lift - physics.gravity*(plane.onGround ? 0 : 0.35);
  plane.y += verticalVel*dt;
  plane.z += plane.speed*dt;
  
  if(plane.y <= 0) {plane.y=0; plane.onGround=true; verticalVel=0; plane.pitch*=0.9;}
  else plane.onGround = false;
  
  if(!keys.ArrowLeft && !keys.KeyA && !keys.ArrowRight && !keys.KeyD) plane.roll *= 0.99;
  
  speedEl.textContent = Math.round(plane.speed*1.94);
  altEl.textContent = Math.round(plane.y*3.28);
  pitchEl.textContent = Math.round(plane.pitch);
  rollEl.textContent = Math.round(plane.roll);
  throttleEl.textContent = Math.round(plane.throttle);
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const cx = w/2;
  const cy = h/2;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-degToRad(plane.roll));
  const horizonOffset = plane.pitch*4;
  ctx.translate(0, horizonOffset);
  
  ctx.fillStyle = '#102a54';
  ctx.fillRect(-w, -h, w*2, h);
  ctx.fillStyle = '#273b1a';
  ctx.fillRect(-w, 0, w*2, h);
  
  ctx.save();
  ctx.translate(0, h*0.18);
  ctx.fillStyle = '#3d3d3d';
  ctx.fillRect(-60, 0, 120, h);
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 3;
  ctx.setLineDash([20, 15]);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, h);
  ctx.stroke();
  ctx.restore();
  ctx.restore();
  
  ctx.save();
  ctx.translate(cx, cy+80);
  ctx.rotate(degToRad(plane.pitch*0.3));
  
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.scale(1, 0.3);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 80, 70, 25, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  ctx.fillStyle = '#cfd8e6';
  ctx.strokeStyle = '#6b7b8e';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-80, 0);
  ctx.quadraticCurveTo(0, -18, 90, 0);
  ctx.quadraticCurveTo(0, 18, -80, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#3a4e73';
  ctx.beginPath();
  ctx.ellipse(35, -6, 22, 12, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.save();
  ctx.rotate(-degToRad(plane.roll*0.6));
  ctx.fillStyle = '#bbc7d8';
  ctx.beginPath();
  ctx.moveTo(-20, -8);
  ctx.lineTo(-120, -30);
  ctx.lineTo(-125, -10);
  ctx.lineTo(-20, 4);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-20, 8);
  ctx.lineTo(-120, 30);
  ctx.lineTo(-125, 10);
  ctx.lineTo(-20, -4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  
  ctx.fillStyle = '#cfd8e6';
  ctx.beginPath();
  ctx.moveTo(-80, 0);
  ctx.lineTo(-110, -25);
  ctx.lineTo(-100, -5);
  ctx.closePath();
  ctx.fill();
  
  ctx.save();
  ctx.translate(86, 0);
  ctx.fillStyle = '#ffb347';
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function loop(timestamp) {
  const dt = Math.min(0.05, (timestamp-lastTime)/1000);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
  </script>
</body>
</html>
